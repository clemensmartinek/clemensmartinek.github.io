<!DOCTYPE html>
<html lang="de" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dehn Programm - Gesundheit</title>
    <link rel="stylesheet" href="theme.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="tailwind.config.js"></script>
</head>
<body>
    <nav class="bg-white dark:bg-slate-800 shadow-md border-b border-gray-200 dark:border-slate-700">
        <div class="container mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center gap-8">
                    <a href="index.html" class="flex items-center gap-2 px-4 py-2 text-gray-700 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400 font-medium transition-colors duration-200 group">
                        <svg class="w-5 h-5 transition-transform duration-200 group-hover:-translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                        </svg>
                        <span>Zurück</span>
                    </a>
                </div>

                <button id="themeToggle" class="p-2 rounded-lg bg-gray-100 dark:bg-slate-700 hover:bg-gray-200 dark:hover:bg-slate-600 transition-colors duration-200">
                    <svg id="sunIcon" class="w-5 h-5 text-gray-800 dark:text-gray-200 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>
                    </svg>
                    <svg id="moonIcon" class="w-5 h-5 text-gray-800 dark:text-gray-200 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
                    </svg>
                </button>
            </div>
        </div>
    </nav>

    <main class="min-h-screen bg-[radial-gradient(circle_at_top_left,_#d1fae5_0%,_#ecfeff_42%,_#f8fafc_100%)] dark:bg-[radial-gradient(circle_at_top_left,_#0f172a_0%,_#111827_45%,_#020617_100%)] py-10">
        <div class="container mx-auto px-4 max-w-5xl">
            <header class="mb-8">
                <div class="bg-white/85 dark:bg-slate-800/80 border border-white/60 dark:border-slate-700 rounded-3xl shadow-xl px-6 py-6 md:px-8 backdrop-blur">
                    <div class="flex flex-wrap items-start justify-between gap-4">
                        <div>
                            <p class="text-sm uppercase tracking-[0.2em] text-emerald-700 dark:text-emerald-300 font-semibold">Gesundheit</p>
                            <h1 class="text-4xl md:text-5xl font-bold mt-2 text-slate-900 dark:text-slate-100">Dehn Programm</h1>
                            <p class="text-gray-600 dark:text-gray-300 mt-3">Klarer Ablauf mit Timer, Pausen und akustischen Signalen.</p>
                        </div>
                        <div class="rounded-2xl bg-emerald-50 dark:bg-emerald-900/30 border border-emerald-200 dark:border-emerald-700 px-5 py-4 min-w-[170px]">
                            <p class="text-xs uppercase tracking-wide text-emerald-700 dark:text-emerald-300">Gesamtdauer</p>
                            <p id="totalDuration" class="text-3xl font-bold text-emerald-800 dark:text-emerald-300 mt-1">0:00</p>
                        </div>
                    </div>
                </div>
            </header>

            <div class="grid lg:grid-cols-3 gap-6">
                <section class="lg:col-span-1 bg-white/90 dark:bg-slate-800/85 rounded-3xl shadow-xl p-6 border border-gray-200/80 dark:border-slate-700">
                    <h2 class="text-lg font-bold text-slate-900 dark:text-slate-100 mb-5">Einstellungen</h2>
                    <div class="space-y-4">
                        <div>
                            <label for="programSelect" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Programm</label>
                            <select id="programSelect" class="w-full px-4 py-3 bg-gray-50 dark:bg-slate-900 border border-gray-300 dark:border-slate-600 rounded-xl text-gray-900 dark:text-gray-100"></select>
                        </div>
                        <div class="grid sm:grid-cols-3 lg:grid-cols-1 gap-3">
                            <div>
                                <label for="restSeconds" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Pause</label>
                                <div class="relative">
                                    <input id="restSeconds" type="number" min="0" step="1" class="w-full px-4 py-3 pr-10 bg-gray-50 dark:bg-slate-900 border border-gray-300 dark:border-slate-600 rounded-xl text-gray-900 dark:text-gray-100" />
                                    <span class="absolute right-3 top-1/2 -translate-y-1/2 text-xs text-gray-500 dark:text-gray-400">s</span>
                                </div>
                            </div>
                            <div>
                                <label for="bilateralSeconds" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Beidseitig</label>
                                <div class="relative">
                                    <input id="bilateralSeconds" type="number" min="1" step="1" class="w-full px-4 py-3 pr-10 bg-gray-50 dark:bg-slate-900 border border-gray-300 dark:border-slate-600 rounded-xl text-gray-900 dark:text-gray-100" />
                                    <span class="absolute right-3 top-1/2 -translate-y-1/2 text-xs text-gray-500 dark:text-gray-400">s</span>
                                </div>
                            </div>
                            <div>
                                <label for="unilateralSeconds" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Einseitig</label>
                                <div class="relative">
                                    <input id="unilateralSeconds" type="number" min="1" step="1" class="w-full px-4 py-3 pr-10 bg-gray-50 dark:bg-slate-900 border border-gray-300 dark:border-slate-600 rounded-xl text-gray-900 dark:text-gray-100" />
                                    <span class="absolute right-3 top-1/2 -translate-y-1/2 text-xs text-gray-500 dark:text-gray-400">s</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>

                <section class="lg:col-span-2 bg-white/90 dark:bg-slate-800/85 rounded-3xl shadow-xl p-6 border border-gray-200/80 dark:border-slate-700">
                    <div class="flex items-center justify-between gap-4 mb-5">
                        <div>
                            <p class="text-sm uppercase tracking-wide text-gray-500 dark:text-gray-400">Aktuelle Phase</p>
                            <p id="currentPhase" class="text-2xl md:text-3xl font-bold text-slate-900 dark:text-slate-100">Noch nicht gestartet</p>
                        </div>
                        <span id="statusPill" class="px-3 py-2 rounded-full bg-gray-100 dark:bg-slate-700 text-gray-700 dark:text-gray-200 text-sm font-medium">Bereit</span>
                    </div>

                    <div class="rounded-2xl bg-slate-50 dark:bg-slate-900/60 border border-slate-200 dark:border-slate-700 px-5 py-6">
                        <p id="countdown" class="text-6xl md:text-7xl font-bold text-cyan-700 dark:text-cyan-400 tabular-nums text-center">00:00</p>
                        <div class="w-full bg-gray-200 dark:bg-slate-700 rounded-full h-3 overflow-hidden mt-5">
                            <div id="progressBar" class="h-full bg-gradient-to-r from-emerald-500 to-cyan-500 transition-all duration-300" style="width: 0%"></div>
                        </div>
                        <p id="stepCounter" class="text-sm text-gray-600 dark:text-gray-300 mt-3 text-center">0 / 0 Schritte</p>
                    </div>

                    <div class="mt-6 space-y-3">
                        <div class="grid grid-cols-3 gap-3">
                            <button id="startButton" class="px-4 py-2.5 rounded-lg bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-semibold transition-colors duration-200 disabled:opacity-50 disabled:cursor-not-allowed">Start</button>
                            <button id="stopButton" class="px-4 py-2.5 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 text-sm font-semibold transition-colors duration-200 disabled:opacity-50 disabled:cursor-not-allowed">Pause</button>
                            <button id="resetButton" class="px-4 py-2.5 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 text-sm font-semibold transition-colors duration-200 disabled:opacity-50 disabled:cursor-not-allowed">Reset</button>
                        </div>
                        <div class="grid grid-cols-3 gap-3">
                            <button id="prevButton" class="px-4 py-2.5 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 text-sm font-semibold transition-colors duration-200 disabled:opacity-50 disabled:cursor-not-allowed">Zurück</button>
                            <button id="nextButton" class="px-4 py-2.5 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 text-sm font-semibold transition-colors duration-200 disabled:opacity-50 disabled:cursor-not-allowed">Vor</button>
                            <button id="openPlanButton" class="px-4 py-2.5 rounded-lg border border-cyan-200 dark:border-cyan-700 bg-cyan-50 dark:bg-cyan-900/20 hover:bg-cyan-100 dark:hover:bg-cyan-900/35 text-cyan-700 dark:text-cyan-300 text-sm font-semibold transition-colors duration-200 disabled:opacity-50 disabled:cursor-not-allowed">Übungsplan</button>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <div id="planModal" class="fixed inset-0 hidden z-50">
        <div id="modalBackdrop" class="absolute inset-0 bg-black/60"></div>
        <div class="relative min-h-full flex items-center justify-center p-4">
            <div class="w-full max-w-3xl bg-white dark:bg-slate-800 rounded-2xl shadow-2xl border border-gray-200 dark:border-slate-700 max-h-[85vh] overflow-hidden">
                <div class="px-6 py-4 border-b border-gray-200 dark:border-slate-700 flex items-center justify-between">
                    <h2 id="modalTitle" class="text-xl font-bold text-gray-900 dark:text-gray-100">Übungsplan</h2>
                    <button id="closeModalButton" class="px-3 py-2 rounded-lg bg-gray-100 dark:bg-slate-700 text-gray-700 dark:text-gray-200">Schließen</button>
                </div>
                <div class="p-6 overflow-y-auto max-h-[70vh]">
                    <div class="mb-4 flex items-center justify-between">
                        <span class="text-gray-700 dark:text-gray-300">Gesamtdauer</span>
                        <span id="modalTotalDuration" class="font-bold text-cyan-700 dark:text-cyan-400">0:00</span>
                    </div>
                    <ol id="planList" class="space-y-3"></ol>
                </div>
            </div>
        </div>
    </div>

    <script src="dehn-programm.js"></script>
</body>
</html>
